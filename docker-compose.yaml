services:

  db:
    image: postgres:18
    environment:
      POSTGRES_DB: projectseed
      POSTGRES_USER: projectseed
      POSTGRES_PASSWORD: projectseed
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U projectseed -d projectseed" ]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: flyway/flyway:12
    command: migrate
    environment:
      FLYWAY_URL: jdbc:postgresql://db:5432/projectseed
      FLYWAY_USER: projectseed
      FLYWAY_PASSWORD: projectseed
    volumes:
      - ./api/sql/src/main/resources/db/migration:/flyway/sql:ro
    depends_on:
      db:
        condition: service_healthy
