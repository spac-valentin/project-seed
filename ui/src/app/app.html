<div class="min-h-screen flex flex-col bg-slate-50">
  <!-- Top Navbar -->
  <header class="bg-white border-b border-slate-200 shadow-sm sticky top-0 z-50">
    <nav class="max-w-6xl mx-auto px-6 h-16 flex items-center justify-between" aria-label="Main navigation">
      <!-- Brand -->
      <a routerLink="/home" class="flex items-center gap-2 focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-500 rounded">
        <span class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center" aria-hidden="true">
          <svg class="w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-1a4 4 0 0 0-4-4h-1M9 20H4v-1a4 4 0 0 1 4-4h1m4-4a4 4 0 1 0-4-4 4 4 0 0 0 4 4z" />
          </svg>
        </span>
        <span class="text-xl font-bold text-slate-800 tracking-tight">PeopleBase</span>
      </a>

      <!-- Nav links -->
      <ul class="flex items-center gap-1" role="list">
        <li>
          <a
            routerLink="/home"
            routerLinkActive="text-indigo-600 bg-indigo-50"
            [routerLinkActiveOptions]="{ exact: true }"
            class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-500 transition-colors"
          >Home</a>
        </li>
        <li>
          <a
            routerLink="/directory"
            routerLinkActive="text-indigo-600 bg-indigo-50"
            class="px-4 py-2 rounded-lg text-sm font-medium text-slate-600 hover:text-indigo-600 hover:bg-indigo-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-indigo-500 transition-colors"
          >Directory</a>
        </li>
      </ul>
    </nav>
  </header>

  <!-- Main content -->
  <div class="flex-1">
    <router-outlet></router-outlet>
  </div>

  <!-- Footer -->
  <footer class="bg-white border-t border-slate-200 py-6 mt-auto">
    <p class="text-center text-xs text-slate-400">&copy; 2026 PeopleBase. All rights reserved.</p>
  </footer>
</div>
