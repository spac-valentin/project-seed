<main class="flex flex-col items-center">
  <!-- Hero Section -->
  <section class="w-full bg-gradient-to-br from-indigo-600 via-indigo-700 to-purple-800 text-white">
    <div class="max-w-5xl mx-auto px-6 py-24 flex flex-col items-center text-center">
      <span class="inline-block bg-white/15 text-white text-sm font-semibold px-4 py-1.5 rounded-full mb-6 tracking-wide uppercase">
        Employee Directory
      </span>
      <h1 class="text-5xl md:text-6xl font-extrabold leading-tight mb-6 tracking-tight">
        Your company,<br />
        <span class="text-indigo-200">everyone in it.</span>
      </h1>
      <p class="text-xl text-indigo-100 max-w-xl mb-10 leading-relaxed">
        Find colleagues instantly — search by name, email, or department and
        connect with the right people across your organisation.
      </p>
      <a
        routerLink="/directory"
        class="inline-flex items-center gap-2 bg-white text-indigo-700 font-semibold text-lg px-8 py-4 rounded-xl shadow-lg hover:bg-indigo-50 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white transition-colors"
      >
        Browse Directory
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3" />
        </svg>
      </a>
    </div>
  </section>

  <!-- Stats Section -->
  <section class="w-full max-w-5xl mx-auto px-6 py-16" aria-label="Company statistics">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-6">
      @for (stat of stats; track stat.label) {
        <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-8 flex flex-col items-center text-center hover:shadow-md transition-shadow">
          <span class="text-4xl mb-4" aria-hidden="true">{{ stat.icon }}</span>
          <span class="text-4xl font-extrabold text-slate-800 mb-1">{{ stat.value }}</span>
          <span class="text-slate-500 font-medium">{{ stat.label }}</span>
        </div>
      }
    </div>
  </section>
</main>
